name: german_bharatham_admin
description: A Flutter project to help Indians settle in Germany.
publish_to: 'none' # Remove this line if you plan to publish to pub.dev
version: 1.0.0+1

environment:
  sdk: ">=3.10.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^8.0.2
  http: ^1.6.0
  url_launcher: ^6.1.0
  shared_preferences: ^2.2.2
  image_picker: ^1.1.2
  share_plus: ^7.2.1
  font_awesome_flutter: ^10.7.0
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  geolocator: ^13.0.0
  google_sign_in: ^6.2.2


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/